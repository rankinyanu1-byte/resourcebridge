<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ResourceBridge — Surplus to Need</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%23703F37'/%3E%3Cellipse cx='18' cy='13' rx='9' ry='7' fill='%23B7C89A' transform='rotate(-35 18 13)'/%3E%3Cline x1='10' y1='22' x2='20' y2='10' stroke='%23703F37' stroke-width='1.5' stroke-linecap='round'/%3E%3C/svg%3E">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --beige:       #CBB7A6;
            --blue:        #7D94B5;
            --pink:        #C29591;
            --brown:       #703F37;
            --sage:        #B7C89A;
            --beige-light: #F0E9E2;
            --blue-light:  #E8EDF5;
            --pink-light:  #F5ECEB;
            --sage-light:  #EBF0E3;
            --brown-dark:  #4A2922;
            --text-dark:   #2C1F1B;
            --text-mid:    #6B5B55;
            --text-soft:   #A0918C;
            --white:       #FDFAF7;
            --surface:     #FAF7F4;
            --border:      #E8E0D8;
            --font-display: 'Cormorant Garamond', Georgia, serif;
            --font-body:   'DM Sans', system-ui, sans-serif;
            --radius-sm:   10px;
            --radius-md:   16px;
            --radius-lg:   24px;
            --radius-xl:   32px;
            --shadow-xs:   0 1px 4px rgba(112,63,55,0.06);
            --shadow-sm:   0 2px 12px rgba(112,63,55,0.08);
            --shadow-md:   0 6px 28px rgba(112,63,55,0.11);
            --shadow-lg:   0 16px 48px rgba(112,63,55,0.14);
            --shadow-xl:   0 24px 64px rgba(112,63,55,0.18);
        }

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        html { scroll-behavior: smooth; }

        body {
            font-family: var(--font-body);
            background: var(--surface);
            color: var(--text-dark);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(18px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to   { opacity: 1; }
        }
        @keyframes slideRight {
            from { transform: translateX(420px); opacity: 0; }
            to   { transform: translateX(0); opacity: 1; }
        }

        .fade-up { animation: fadeUp 0.55s cubic-bezier(.22,.68,0,1.2) both; }
        .fade-up-1 { animation-delay: .05s; }
        .fade-up-2 { animation-delay: .12s; }
        .fade-up-3 { animation-delay: .19s; }
        .fade-up-4 { animation-delay: .26s; }

        
        .app-container {
            max-width: 1360px;
            margin: 0 auto;
            padding: 0 24px 60px;
        }

        
        .header {
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 40px;
            margin: 0 -24px 40px;
            background: rgba(253,250,247,0.72);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border-bottom: 1px solid rgba(203,183,166,0.35);
            box-shadow: 0 2px 24px rgba(112,63,55,0.07);
            animation: fadeIn 0.4s ease both;
        }

        .logo {
            font-family: var(--font-display);
            font-size: 26px;
            font-weight: 500;
            letter-spacing: 0.02em;
            color: var(--brown);
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: default;
        }
        .logo-leaf {
            width: 30px;
            height: 30px;
            background: var(--sage);
            border-radius: 50% 4px 50% 4px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            flex-shrink: 0;
            box-shadow: var(--shadow-xs);
        }
        .logo-tagline {
            font-family: var(--font-body);
            font-size: 11px;
            font-weight: 400;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--text-soft);
            display: block;
            margin-top: 2px;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .user-pill {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 16px 8px 8px;
            background: var(--beige-light);
            border: 1px solid var(--border);
            border-radius: 40px;
            transition: box-shadow 0.25s;
        }
        .user-pill:hover { box-shadow: var(--shadow-sm); }

        .user-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--beige);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            box-shadow: var(--shadow-xs);
            flex-shrink: 0;
        }

        .user-name {
            font-weight: 500;
            font-size: 14px;
            color: var(--text-dark);
            line-height: 1.2;
        }
        .user-role {
            font-size: 11px;
            color: var(--text-soft);
            text-transform: capitalize;
            letter-spacing: 0.04em;
        }

        
        .btn {
            padding: 11px 22px;
            border: none;
            border-radius: var(--radius-sm);
            font-family: var(--font-body);
            font-size: 13.5px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(.22,.68,0,1.2);
            display: inline-flex;
            align-items: center;
            gap: 7px;
            letter-spacing: 0.01em;
            white-space: nowrap;
        }
        .btn:active { transform: scale(0.97); }

        .btn-primary {
            background: var(--brown);
            color: var(--white);
            box-shadow: 0 3px 14px rgba(112,63,55,0.25);
        }
        .btn-primary:hover {
            background: var(--brown-dark);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(112,63,55,0.32);
        }

        .btn-secondary {
            background: var(--beige-light);
            color: var(--brown);
            border: 1px solid var(--border);
        }
        .btn-secondary:hover {
            background: var(--beige);
            transform: translateY(-1px);
            box-shadow: var(--shadow-sm);
        }

        .btn-success {
            background: var(--sage);
            color: var(--brown-dark);
            box-shadow: 0 3px 12px rgba(183,200,154,0.35);
        }
        .btn-success:hover {
            background: #a5ba87;
            transform: translateY(-2px);
            box-shadow: 0 6px 18px rgba(183,200,154,0.45);
        }

        .btn-danger {
            background: var(--pink-light);
            color: var(--brown);
            border: 1px solid var(--pink);
        }
        .btn-danger:hover {
            background: var(--pink);
            color: var(--white);
            transform: translateY(-1px);
        }

        .btn-warning {
            background: #f0d9a0;
            color: #6b4a00;
        }
        .btn-warning:hover { background: #e5ca82; transform: translateY(-1px); }

        .btn-small { padding: 8px 16px; font-size: 12.5px; }
        .btn-ghost {
            background: transparent;
            color: var(--text-soft);
            border: 1px solid var(--border);
        }
        .btn-ghost:hover {
            background: var(--beige-light);
            color: var(--text-dark);
        }

    
        .content {
            background: var(--white);
            border-radius: var(--radius-xl);
            border: 1px solid var(--border);
            padding: 44px 48px;
            min-height: 600px;
            box-shadow: var(--shadow-md);
            animation: fadeUp 0.5s ease both;
        }

    
        .tab-container {
            display: flex;
            gap: 4px;
            margin-bottom: 40px;
            background: var(--beige-light);
            padding: 5px;
            border-radius: var(--radius-md);
            width: fit-content;
            overflow-x: auto;
        }

        .tab {
            padding: 10px 22px;
            background: transparent;
            border: none;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-family: var(--font-body);
            font-size: 13.5px;
            font-weight: 500;
            color: var(--text-soft);
            transition: all 0.22s ease;
            white-space: nowrap;
        }
        .tab:hover { color: var(--brown); background: rgba(255,255,255,0.6); }
        .tab.active {
            background: var(--white);
            color: var(--brown);
            box-shadow: var(--shadow-xs);
            font-weight: 600;
        }

        
        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 36px;
        }

        .dashboard-title {
            font-family: var(--font-display);
            font-size: 38px;
            font-weight: 400;
            color: var(--text-dark);
            letter-spacing: -0.01em;
            line-height: 1.1;
        }

        .dashboard-subtitle {
            color: var(--text-soft);
            font-size: 14px;
            margin-top: 6px;
            letter-spacing: 0.01em;
        }

        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 18px;
            margin-bottom: 44px;
        }

        .stat-card {
            background: var(--white);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 28px 26px;
            position: relative;
            overflow: hidden;
            transition: all 0.3s cubic-bezier(.22,.68,0,1.2);
            cursor: default;
            animation: fadeUp 0.5s ease both;
        }
        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-lg);
            border-color: transparent;
        }

        .stat-card:nth-child(1) { background: var(--beige-light); border-color: var(--beige); }
        .stat-card:nth-child(2) { background: var(--sage-light);  border-color: var(--sage);  }
        .stat-card:nth-child(3) { background: var(--blue-light);  border-color: var(--blue);  }
        .stat-card:nth-child(4) { background: var(--pink-light);  border-color: var(--pink);  }

        .stat-card-icon {
            font-size: 28px;
            margin-bottom: 16px;
            display: block;
        }

        .stat-value {
            font-family: var(--font-display);
            font-size: 48px;
            font-weight: 500;
            color: var(--brown);
            line-height: 1;
            margin-bottom: 6px;
        }

        .stat-label {
            font-size: 12.5px;
            color: var(--text-mid);
            font-weight: 500;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        .stat-trend {
            margin-top: 10px;
            font-size: 12px;
            color: var(--text-soft);
            font-style: italic;
            font-family: var(--font-display);
        }

        
        .resource-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 22px;
            margin-top: 24px;
        }

        .resource-card {
            background: var(--white);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 26px;
            transition: all 0.32s cubic-bezier(.22,.68,0,1.2);
            cursor: pointer;
            position: relative;
            overflow: hidden;
            animation: fadeUp 0.45s ease both;
        }
        .resource-card::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: var(--radius-lg);
            background: linear-gradient(135deg, rgba(203,183,166,0.07), transparent);
            opacity: 0;
            transition: opacity 0.3s;
        }
        .resource-card:hover {
            transform: translateY(-6px);
            box-shadow: var(--shadow-xl);
            border-color: var(--beige);
        }
        .resource-card:hover::before { opacity: 1; }

        .resource-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 16px;
        }

        .resource-category {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 13px;
            border-radius: 40px;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.04em;
        }

        .category-food     { background: #fef3c7; color: #7a5600; }
        .category-clothes  { background: var(--blue-light);  color: #3a5070; }
        .category-devices  { background: #ede9fe; color: #5b3a8a; }
        .category-crops    { background: var(--sage-light);  color: #3d5c28; }
        .category-medicine { background: var(--pink-light);  color: var(--brown); }

        .status-badge {
            padding: 5px 11px;
            border-radius: 40px;
            font-size: 10.5px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.07em;
        }

        .status-available { background: var(--sage-light);  color: #3d5c28; }
        .status-reserved  { background: #fef3c7; color: #7a5600; }
        .status-completed { background: var(--blue-light);  color: #3a5070; }

        .resource-title {
            font-family: var(--font-display);
            font-size: 20px;
            font-weight: 500;
            margin-bottom: 10px;
            color: var(--text-dark);
            line-height: 1.2;
        }

        .resource-description {
            color: var(--text-soft);
            font-size: 13.5px;
            line-height: 1.65;
            margin-bottom: 16px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .resource-divider {
            height: 1px;
            background: var(--border);
            margin: 16px 0;
        }

        .resource-info {
            display: flex;
            flex-direction: column;
            gap: 8px;
            color: var(--text-mid);
            font-size: 13px;
            margin-bottom: 18px;
        }

        .resource-info-item {
            display: flex;
            align-items: center;
            gap: 9px;
        }

        .resource-info-icon {
            width: 18px;
            text-align: center;
            opacity: 0.7;
            font-size: 13px;
        }

        .resource-actions {
            display: flex;
            gap: 10px;
            margin-top: 18px;
        }

        .distance-badge {
            background: var(--blue-light);
            color: var(--blue);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

       
        .contact-note {
            margin-top: 14px;
            padding: 10px 14px;
            background: var(--blue-light);
            border: 1px solid rgba(125,148,181,0.25);
            border-radius: var(--radius-sm);
            font-size: 12.5px;
            color: var(--blue);
            font-weight: 500;
        }

      
        .form-section {
            max-width: 720px;
            margin: 0 auto;
            background: var(--surface);
            padding: 40px;
            border-radius: var(--radius-lg);
            border: 1px solid var(--border);
        }

        .form-section-title {
            font-family: var(--font-display);
            font-size: 28px;
            font-weight: 400;
            color: var(--text-dark);
            margin-bottom: 28px;
        }

        .form-group { margin-bottom: 22px; }

        .form-label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: var(--text-mid);
            font-size: 13px;
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }

        .form-input, .form-select, .form-textarea {
            width: 100%;
            padding: 13px 16px;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 14px;
            font-family: var(--font-body);
            background: var(--white);
            color: var(--text-dark);
            transition: all 0.22s ease;
        }
        .form-input:focus, .form-select:focus, .form-textarea:focus {
            outline: none;
            border-color: var(--beige);
            box-shadow: 0 0 0 3px rgba(203,183,166,0.2);
            background: var(--white);
        }
        .form-input::placeholder { color: var(--text-soft); }
        .form-textarea { min-height: 110px; resize: vertical; }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 18px;
        }

        .location-info {
            background: var(--blue-light);
            border: 1px solid rgba(125,148,181,0.3);
            padding: 14px 18px;
            border-radius: var(--radius-sm);
            margin-top: 10px;
            color: var(--blue);
            font-size: 13px;
            font-weight: 500;
        }

        
        .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: var(--text-soft);
        }
        .empty-state-icon { font-size: 60px; margin-bottom: 20px; opacity: 0.35; display: block; }
        .empty-state-text {
            font-family: var(--font-display);
            font-size: 24px;
            font-weight: 400;
            margin-bottom: 10px;
            color: var(--text-mid);
        }
        .empty-state-subtext { color: var(--text-soft); font-size: 14px; }

        
        .chart-container {
            background: var(--surface);
            padding: 32px;
            border-radius: var(--radius-lg);
            border: 1px solid var(--border);
            margin-top: 32px;
        }

        .chart-title {
            font-family: var(--font-display);
            font-size: 22px;
            font-weight: 400;
            margin-bottom: 24px;
            color: var(--text-dark);
        }

        
        .notification {
            position: fixed;
            top: 28px;
            right: 28px;
            background: var(--white);
            padding: 18px 22px;
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-xl);
            z-index: 2000;
            animation: slideRight 0.35s cubic-bezier(.22,.68,0,1.2);
            min-width: 300px;
            max-width: 380px;
            display: flex;
            align-items: flex-start;
            gap: 14px;
            border: 1px solid var(--border);
        }

        .notification-success { border-left: 4px solid var(--sage); }
        .notification-error   { border-left: 4px solid var(--pink); }
        .notification-warning { border-left: 4px solid #e6c670; }
        .notification-info    { border-left: 4px solid var(--blue); }

        .notification-icon { font-size: 20px; margin-top: 1px; }
        .notification-content { flex: 1; }
        .notification-title { font-weight: 600; color: var(--text-dark); margin-bottom: 3px; font-size: 14px; }
        .notification-message { font-size: 13px; color: var(--text-soft); line-height: 1.5; }

        
        .quick-actions {
            display: flex;
            gap: 16px;
            margin-bottom: 32px;
        }

        .quick-action-card {
            flex: 1;
            background: var(--surface);
            padding: 24px;
            border-radius: var(--radius-lg);
            border: 1px solid var(--border);
            cursor: pointer;
            transition: all 0.3s cubic-bezier(.22,.68,0,1.2);
            text-align: center;
        }
        .quick-action-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-lg);
            border-color: var(--beige);
            background: var(--white);
        }

        .quick-action-icon { font-size: 32px; margin-bottom: 10px; display: block; }
        .quick-action-title { font-weight: 600; color: var(--text-dark); margin-bottom: 4px; font-size: 14.5px; }
        .quick-action-desc  { font-size: 12.5px; color: var(--text-soft); }

        
        .verification-banner {
            background: #fef9ec;
            border: 1px solid #e6c670;
            border-radius: var(--radius-lg);
            padding: 28px 32px;
            margin-bottom: 32px;
            display: flex;
            align-items: center;
            gap: 20px;
        }
        .verification-icon { font-size: 40px; }
        .verification-title { font-family: var(--font-display); font-size: 22px; font-weight: 500; color: #7a5600; margin-bottom: 6px; }
        .verification-text  { color: #8a6200; font-size: 14px; line-height: 1.6; }

        
        .impact-summary {
            background: var(--sage-light);
            border: 1px solid var(--sage);
            border-radius: var(--radius-lg);
            padding: 32px;
            margin-top: 32px;
        }
        .impact-title {
            font-family: var(--font-display);
            font-size: 24px;
            font-weight: 400;
            color: var(--brown);
            margin-bottom: 22px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .impact-items {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 18px;
        }
        .impact-item {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #3d5c28;
            font-size: 14px;
            font-weight: 500;
        }
        .impact-item-icon { font-size: 22px; }

        
        .filter-bar {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            flex-wrap: wrap;
            align-items: center;
        }

        .filter-label {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-soft);
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        .filter-select {
            padding: 9px 14px;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 13.5px;
            font-family: var(--font-body);
            font-weight: 500;
            cursor: pointer;
            background: var(--white);
            color: var(--text-dark);
            transition: border-color 0.2s;
        }
        .filter-select:focus { outline: none; border-color: var(--beige); }

       
        .admin-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 22px;
        }

        .admin-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 28px;
            transition: all 0.3s cubic-bezier(.22,.68,0,1.2);
        }

        // Release a RESERVED resource back to AVAILABLE and delete the NGO's request doc

        // ── Client-side sort helper (avoids composite index requirements) ───
        // Firestore serverTimestamp() Timestamps have .toMillis(); plain Date
        // strings also work. Falls back gracefully if field is missing.
        function _byCreatedAtDesc(a, b) {
            const toMs = v => {
                if (!v) return 0;
                if (typeof v.toMillis === 'function') return v.toMillis();
                return new Date(v).getTime() || 0;
            };
            return toMs(b.createdAt) - toMs(a.createdAt);
        }

        // Real-time: donor's own resources  — NO orderBy (no composite index needed)

        /* ─────────────────────────────────────────────────────────────────
           3. GLOBAL AUTH STATE  –  resolved BEFORE React boots
              Stores the resolved Firestore profile in window.__fbUser.
              Uses a retry loop so a slow Firestore read never stalls the app.
        ───────────────────────────────────────────────────────────────── */
        window.__fbUser       = null;
        window.__fbAuthReady  = false;
        window.__fbAuthCallback = null;
        // When set to true, onAuthStateChanged will still update __fbUser but
        // will NOT fire __fbAuthCallback or sign out on missing profile.
        // Used by fbEnsureDemoAccount to prevent race-condition sign-outs
        // while it is in the middle of creating a new account + Firestore doc.
        window.__fbSkipAuthCallback = false;

        fbAuth.onAuthStateChanged(async (firebaseUser) => {
            console.log("[FB] onAuthStateChanged fired — user:", firebaseUser ? firebaseUser.uid : "null",
                        "| skipCallback:", window.__fbSkipAuthCallback);

            // If a demo/signup flow is actively managing auth, skip all side-effects.
            // The calling code is responsible for setting __fbUser and calling __fbAuthCallback.
            if (window.__fbSkipAuthCallback) {
                console.log("[FB] onAuthStateChanged — skipped (demo/signup flow in progress)");
                window.__fbAuthReady = true;
                return;
            }

            if (firebaseUser) {
                // Retry up to 5 times with increasing back-off.
                // Handles cold-start Firestore latency and sign-up timing.
                let profile = null;
                for (let attempt = 1; attempt <= 5; attempt++) {
                    profile = await fbGetUser(firebaseUser.uid);
                    if (profile) break;
                    console.warn(`[FB] Profile fetch attempt ${attempt} returned null — retrying…`);
                    await new Promise(r => setTimeout(r, 400 * attempt));
                }
                if (!profile) {
                    // Firestore doc genuinely missing — sign user out cleanly
                    console.error("[FB] No Firestore profile after 5 attempts — signing out");
                    await fbAuth.signOut();
                    window.__fbUser = null;
                } else {
                    window.__fbUser = profile;
                    console.log("[FB] Auth profile resolved:", profile.uid, "role:", profile.role);
                    // Run rules probe in background (non-blocking)
                    probeFirestoreRules(profile.uid).catch(() => {});
                }
            } else {
                window.__fbUser = null;
            }

            window.__fbAuthReady = true;

            if (typeof window.__fbAuthCallback === "function") {
                window.__fbAuthCallback(window.__fbUser);
            }
        });

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        /* ─────────────────────────────────────────────────────────────────
           Haversine distance (unchanged utility)
        ───────────────────────────────────────────────────────────────── */

        function getDistance(lat1, lon1, lat2, lon2) {
            const R = 6371, dLat = (lat2 - lat1) * Math.PI / 180, dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat / 2) ** 2 + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon / 2) ** 2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
        }

        function formatDate(value) {
            if (!value) return '—';
            // Firestore Timestamp object has a toDate() method
            const d = value?.toDate ? value.toDate() : new Date(value);
            if (isNaN(d.getTime())) return '—';
            return d.toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' });
        }

        /**
         * fbEnsureDemoAccount
         * Attempts to sign in with the demo credentials.
         * If auth/user-not-found → creates the Firebase Auth user AND the
         * Firestore profile document so the demo works from scratch.
         * Returns the full Firestore profile object.
         */
        async function fbEnsureDemoAccount(key) {
            const acct = DEMO_ACCOUNTS[key];
            console.log(`[Demo] Ensuring demo account: ${key} (${acct.email})`);

            // Block onAuthStateChanged from interfering while we manage the auth flow.
            // Without this guard, creating a new Auth account fires onAuthStateChanged
            // BEFORE the Firestore doc is written, causing the handler to sign the user out.
            window.__fbSkipAuthCallback = true;

            try {
                // ── 1. Sign out any different currently-active session ──────────────
                const currentUser = fbAuth.currentUser;
                if (currentUser && currentUser.email !== acct.email) {
                    console.log(`[Demo] Signing out current user (${currentUser.email}) before demo switch`);
                    await fbAuth.signOut();
                }

                // ── 2. Try to sign in with demo credentials ─────────────────────────
                let uid = null;
                try {
                    const cred = await fbAuth.signInWithEmailAndPassword(acct.email, acct.password);
                    uid = cred.user.uid;
                    console.log(`[Demo] Sign-in success for ${key}:`, uid);
                } catch (signInErr) {
                    const notFound = [
                        'auth/user-not-found',
                        'auth/invalid-credential',
                        'auth/wrong-password',
                        'auth/invalid-login-credentials'
                    ];
                    if (notFound.includes(signInErr.code)) {
                        // ── 3. Account doesn't exist yet — create it ────────────────
                        console.log(`[Demo] Account not found for ${key} — creating fresh account`);
                        try {
                            const newCred = await fbAuth.createUserWithEmailAndPassword(acct.email, acct.password);
                            uid = newCred.user.uid;
                            console.log(`[Demo] New Auth account created — uid: ${uid}`);
                        } catch (createErr) {
                            console.error(`[Demo] Failed to create ${key} auth account:`, createErr.code, createErr.message);
                            throw new Error(`Could not create demo ${key} account: ${createErr.message}`);
                        }
                    } else {
                        console.error(`[Demo] Unexpected sign-in error for ${key}:`, signInErr.code, signInErr.message);
                        throw signInErr;
                    }
                }

                // ── 4. Fetch Firestore profile with retry, or create it ─────────────
                let profile = null;
                for (let attempt = 1; attempt <= 5; attempt++) {
                    profile = await fbGetUser(uid);
                    if (profile) break;
                    console.warn(`[Demo] Firestore profile not found (attempt ${attempt}) — waiting…`);
                    await new Promise(r => setTimeout(r, 300 * attempt));
                }

                if (!profile) {
                    console.log(`[Demo] Creating Firestore doc for ${key}`);
                    const profileData = {
                        uid,
                        name:      acct.name,
                        email:     acct.email,
                        role:      acct.role,
                        phone:     acct.phone,
                        latitude:  acct.latitude,
                        longitude: acct.longitude,
                        verified:  acct.verified
                    };
                    await fbCreateUser(uid, profileData);
                    profile = { uid, ...profileData };
                    console.log(`[Demo] ✓ Firestore doc created — role: ${acct.role}`);
                } else {
                    // Self-heal: ensure role/verified fields are correct (repairs corrupt docs)
                    if (profile.role !== acct.role || profile.verified !== acct.verified) {
                        console.warn(`[Demo] Role/verified mismatch — repairing Firestore doc`);
                        await fbUpdateUser(uid, { role: acct.role, verified: acct.verified, name: acct.name });
                        profile = { ...profile, role: acct.role, verified: acct.verified, name: acct.name };
                    }
                }

                console.log(`[Demo] ✓ Profile ready — role: ${profile.role}, verified: ${profile.verified}`);

                // ── 5. Commit to global state ───────────────────────────────────────
                window.__fbUser      = profile;
                window.__fbAuthReady = true;
                return profile;

            } finally {
                // Always restore the flag so future normal auth events work correctly
                window.__fbSkipAuthCallback = false;
            }
        }

            const [password, setPassword] = useState('');
            const [name, setName] = useState('');
            const [role, setRole] = useState('donor');
            const [phone, setPhone] = useState('');
            const [location, setLocation] = useState({ latitude: 19.0760, longitude: 72.8777 });
            const [error, setError] = useState('');
            const [loading, setLoading] = useState(false);
            const [demoLoading, setDemoLoading] = useState(null); // 'donor'|'ngo'|'admin'|null

            useEffect(() => {
                if (navigator.geolocation) {
                    navigator.geolocation.getCurrentPosition(
                        (p) => setLocation({ latitude: p.coords.latitude, longitude: p.coords.longitude }),
                        () => {}
                    );
                }
            }, []);

            /* ── Readable Firebase error messages ── */
            const friendlyError = (err) => {
                const map = {
                    'auth/user-not-found':       'No account found with this email.',
                    'auth/invalid-credential':   'Incorrect email or password.',
                    'auth/wrong-password':        'Incorrect password.',
                    'auth/email-already-in-use': 'An account with this email already exists.',
                    'auth/weak-password':         'Password must be at least 6 characters.',
                    'auth/invalid-email':         'Please enter a valid email address.',
                    'auth/too-many-requests':     'Too many attempts. Please wait a moment and try again.',
                    'auth/network-request-failed':'Network error. Please check your connection.'
                };
                return map[err.code] || err.message;
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                setError('');
                setLoading(true);
                try {
                    if (isLogin) {
                        // ── SIGN IN ──────────────────────────────────────
                        console.log("[Auth] Attempting sign-in for:", email);
                        const cred    = await fbAuth.signInWithEmailAndPassword(email, password);
                        const profile = await fbGetUser(cred.user.uid);
                        if (!profile) throw new Error("User profile not found. Please contact support.");
                        console.log("[Auth] Sign-in success — role:", profile.role, "uid:", profile.uid);
                        window.__fbUser = profile;
                        onLogin(profile);
                    } else {
                        // ── SIGN UP ──────────────────────────────────────
                        if (!name || !email || !password || !phone) {
                            setError('Please fill in all fields.');
                            setLoading(false);
                            return;
                        }
                        console.log("[Auth] Creating account — role:", role, "email:", email);
                        // Block onAuthStateChanged from racing ahead before Firestore doc is ready
                        window.__fbSkipAuthCallback = true;
                        try {
                            const cred = await fbAuth.createUserWithEmailAndPassword(email, password);
                            const uid  = cred.user.uid;
                            // Admin accounts created via sign-up get verified:true automatically.
                            // NGOs go through the pending → admin-approval flow.
                            const profile = {
                                uid,
                                name,
                                email,
                                role,
                                phone,
                                latitude:  location.latitude,
                                longitude: location.longitude,
                                verified:  role === 'donor' || role === 'admin'
                            };
                            await fbCreateUser(uid, profile);
                            console.log("[Auth] Account created — uid:", uid, "role:", role, "verified:", profile.verified);
                            window.__fbUser      = profile;
                            window.__fbAuthReady = true;
                            onLogin(profile);
                        } finally {
                            window.__fbSkipAuthCallback = false;
                        }
                    }
                } catch (err) {
                    console.error("[Auth] Error:", err.code, err.message);
                    setError(friendlyError(err));
                } finally {
                    setLoading(false);
                }
            };

            /**
             * quickLogin
             * Triggered by demo buttons. Calls fbEnsureDemoAccount which
             * automatically creates the account if it doesn't exist yet,
             * then signs in and routes to the correct dashboard.
             */
            const quickLogin = async (key) => {
                setError('');
                setDemoLoading(key);
                console.log(`[Demo] Quick-login triggered for: ${key}`);
                try {
                    const profile = await fbEnsureDemoAccount(key);
                    window.__fbUser = profile;
                    console.log(`[Demo] ✓ Routing to dashboard — role: ${profile.role}`);
                    onLogin(profile);
                } catch (err) {
                    console.error(`[Demo] quickLogin failed for ${key}:`, err.message);
                    setError(`Demo login failed: ${err.message}`);
                } finally {
                    setDemoLoading(null);
                }
            };

            return (
                <div className="auth-wrapper">
                    <div className="auth-card">

                        {error && <div className="error-msg">{error}</div>}

                                    </div>
                                    <div className="form-group">
                                        <label className="form-label">Role</label>
                                        <select className="form-select" value={role} onChange={e => setRole(e.target.value)}>

                                    </div>

                                {loading ? '⏳ Please wait…' : (isLogin ? 'Sign In' : 'Create Account')}
                            </button>
                        </form>

                        <div className="auth-toggle">
                            {isLogin ? "New here? " : "Have an account? "}
                            <span className="auth-toggle-link" onClick={() => { setIsLogin(!isLogin); setError(''); }}>
                                {isLogin ? 'Create account' : 'Sign in'}
                            </span>
                        </div>

                        {isLogin && (
                            <div className="auth-demo">
                                <div className="auth-demo-label">Quick demo access</div>
                                <div className="auth-demo-btns">
                                    <button
                                        type="button"
                                        className="btn btn-secondary btn-small"
                                        disabled={demoLoading !== null}
                                        style={{ opacity: demoLoading !== null ? 0.65 : 1 }}
                                        onClick={() => quickLogin('donor')}

                                    <button
                                        type="button"

                                        disabled={demoLoading !== null}
                                        style={{ opacity: demoLoading !== null ? 0.65 : 1 }}

                                    <button

        function NGODashboard({ user, onUpdate }) {
            const [activeTab, setActiveTab]       = useState('available');
            const [resources, setResources]       = useState([]);   
            const [myRequests, setMyRequests]     = useState([]);   
            const [acceptedRes, setAcceptedRes]   = useState([]);   
            const [notification, setNotification] = useState(null);
            const [categoryFilter, setCategoryFilter] = useState('All');
            const [acceptingId, setAcceptingId]   = useState(null); 
            const [releasingId, setReleasingId]   = useState(null); 
            const [acceptError, setAcceptError]   = useState(null); 
            const [rulesBlocked, setRulesBlocked] = useState(false); 
            const [showRulesHelp, setShowRulesHelp] = useState(false);

        
            useEffect(() => {
                const interval = setInterval(() => {
                    if (window.__rulesOk === false) {
                        setRulesBlocked(true);
                        clearInterval(interval);
                    } else if (window.__rulesOk === true) {
                        setRulesBlocked(false);
                        clearInterval(interval);
                    }
                }, 800);
                return () => clearInterval(interval);
            }, []);
            const unsubResRef    = useRef(null);
            const unsubReqRef    = useRef(null);
            const acceptedSubsRef = useRef({});
            const acceptedMapRef  = useRef({});
            const userLat = user.latitude  || 19.0760;
            const userLng = user.longitude || 72.8777;

            useEffect(() => {
                unsubResRef.current = fbListenAvailableResources((docs) => {
                    const withDist = docs
                        .map(r => ({
                            ...r,
                            latitude:  r.latitude  || 19.0760,
                            longitude: r.longitude || 72.8777,
                            distance:  getDistance(userLat, userLng, r.latitude || 19.0760, r.longitude || 72.8777)
                        }))
                        .sort((a, b) => a.distance - b.distance);
                    console.log("[NGO] Available resources loaded:", withDist.length);
                    setResources(withDist);
                });

                
                unsubReqRef.current = fbListenNGORequests(user.uid, (reqs) => {
                    setMyRequests(reqs);

                    const currentIds = new Set(reqs.map(r => r.resourceId));
                    Object.keys(acceptedSubsRef.current).forEach(rid => {
                        if (!currentIds.has(rid)) {
                            acceptedSubsRef.current[rid]();
                            delete acceptedSubsRef.current[rid];
                            delete acceptedMapRef.current[rid];
                        }
                    });
                    reqs.forEach(req => {
                        if (acceptedSubsRef.current[req.resourceId]) return;

                        const unsub = fbDB.collection("resources").doc(req.resourceId)
                            .onSnapshot(
                                snap => {
                                    if (!snap.exists) {
                                        delete acceptedMapRef.current[req.resourceId];
                                    } else {
                                        const r = { id: snap.id, ...snap.data() };
                                        acceptedMapRef.current[req.resourceId] = {
                                            ...r,
                                            latitude:  r.latitude  || 0,
                                            longitude: r.longitude || 0,
                                            distance:  getDistance(userLat, userLng, r.latitude || 0, r.longitude || 0)
                                        };
                                    }
                                    setAcceptedRes(Object.values(acceptedMapRef.current));
                                },
                                e => console.error("[FB] accepted resource listener:", req.resourceId, e.message)
                            );

                        acceptedSubsRef.current[req.resourceId] = unsub;
                    });
                });

                return () => {
                    if (unsubResRef.current)  unsubResRef.current();
                    if (unsubReqRef.current)  unsubReqRef.current();
                    Object.values(acceptedSubsRef.current).forEach(fn => fn());
                    acceptedSubsRef.current = {};
                    acceptedMapRef.current  = {};
                };
            }, [user.uid]);

            const handleAccept = async (resource) => {
                if (acceptingId) return; 
                console.log("[NGO] Accepting resource:", resource.id, "| NGO uid:", user.uid, "| verified:", user.verified);
                setAcceptingId(resource.id);
                setAcceptError(null); 
                try {
                    console.log("[NGO] Step 1 — writing request doc");
                    const reqRef = fbDB.collection("requests").doc();
                    await reqRef.set({
                        resourceId: resource.id,
                        ngoId:      user.uid,

                    });
                    console.log("[NGO] Step 1 done — request doc written:", reqRef.id);

                    
                    console.log("[NGO] Step 2 — updating resource status to RESERVED");
                    await fbDB.collection("resources").doc(resource.id).update({
                        status:      'RESERVED',

                            {showRulesHelp && (
                                <pre style={{
                                    marginTop: '16px', background: '#1e1e1e', color: '#d4d4d4',
                                    padding: '16px', borderRadius: 'var(--radius-sm)', fontSize: '12px',
                                    overflowX: 'auto', lineHeight: 1.7, whiteSpace: 'pre'
                                }}>{`rules_version = '2';
service cloud.firestore {
  match /databases/{database}/documents {

    // Users: anyone authenticated can read;
    // owner can write their own doc; admin can update any user (for NGO verification)
    match /users/{userId} {
      allow read: if request.auth != null;
      allow write: if request.auth != null && request.auth.uid == userId;
      allow update: if request.auth != null;
    }

    // Resources: authenticated users can read; donors can create/update their own
    // NGOs can update status to RESERVED (to accept a resource)
    match /resources/{resourceId} {
      allow read: if request.auth != null;
      allow create: if request.auth != null;
      allow update: if request.auth != null;
      allow delete: if request.auth != null
                    && request.auth.uid == resource.data.donorId;

    // Requests: authenticated users can read/create; NGOs can manage their own
    match /requests/{requestId} {
      allow read: if request.auth != null;
      allow create: if request.auth != null;
      allow update, delete: if request.auth != null
                            && request.auth.uid == resource.data.ngoId;
    }

    // Rules probe (used by the app to detect permission issues)
    match /_rules_probe/{uid} {
      allow read, write, delete: if request.auth != null && request.auth.uid == uid;
    }
  }
}`}</pre>

        function App() {
            const [user, setUser]               = useState(window.__fbUser || null);
            const [showLanding, setShowLanding] = useState(!window.__fbUser);
            const [activeView, setActiveView]   = useState('dashboard');
            const [updateTrigger, setUpdateTrigger] = useState(0);
            const [authChecked, setAuthChecked] = useState(window.__fbAuthReady);
            const selfProfileUnsubRef = useRef(null);

            
            const attachSelfProfileListener = (uid) => {
                
                if (selfProfileUnsubRef.current) {
                    selfProfileUnsubRef.current();
                    selfProfileUnsubRef.current = null;
                }
                if (!uid) return;
                console.log("[App] Attaching self-profile listener for uid:", uid);
                selfProfileUnsubRef.current = fbDB.collection("users").doc(uid)
                    .onSnapshot(
                        snap => {
                            if (!snap.exists) return;
                            const updated = { uid: snap.id, ...snap.data() };
                            console.log("[App] Self-profile updated — role:", updated.role, "verified:", updated.verified);
                            window.__fbUser = updated;
                            setUser(updated);
                        },
                        e => console.error("[App] Self-profile listener error:", e.message)
                    );
            };

            useEffect(() => {
                
                window.__fbAuthCallback = (profile) => {
                    console.log("[App] __fbAuthCallback fired — profile:", profile ? profile.role : 'null');
                    setAuthChecked(true);
                    setUser(profile);
                    if (!profile) {
                        setShowLanding(true);
                        setActiveView('dashboard');
                        
                        if (selfProfileUnsubRef.current) {
                            selfProfileUnsubRef.current();
                            selfProfileUnsubRef.current = null;
                        }
                    } else {
                        console.log("[App] Auth callback — routing to dashboard for role:", profile.role);
                        setShowLanding(false);
                        attachSelfProfileListener(profile.uid);
                    }
                };
                
                if (window.__fbAuthReady) {
                    setAuthChecked(true);
                    setUser(window.__fbUser);
                    if (window.__fbUser) {
                        setShowLanding(false);
                        attachSelfProfileListener(window.__fbUser.uid);
                    }
                }
                return () => {
                    window.__fbAuthCallback = null;
                    if (selfProfileUnsubRef.current) selfProfileUnsubRef.current();
                };
            }, []);

            
            if (!authChecked) {
                return (
                    <div style={{ minHeight: '100vh', display: 'flex', alignItems: 'center', justifyContent: 'center', background: 'var(--surface)' }}>
                        <div style={{ textAlign: 'center', color: 'var(--text-soft)' }}>
                            <div style={{ fontSize: '48px', marginBottom: '16px' }}>🌿</div>
                            <div style={{ fontFamily: 'var(--font-display)', fontSize: '22px', color: 'var(--brown)' }}>ResourceBridge</div>
                            <div style={{ marginTop: '10px', fontSize: '13px' }}>Loading…</div>
                        </div>
                    </div>
                );
            }

            const handleLogin = (profile) => {
                console.log("[App] handleLogin — role:", profile.role, "uid:", profile.uid);
                window.__fbUser = profile;
                setUser(profile);
                setShowLanding(false);
                setActiveView('dashboard'); 
                attachSelfProfileListener(profile.uid);
            };

            const handleLogout = async () => {
                console.log("[App] Signing out");
                if (selfProfileUnsubRef.current) {
                    selfProfileUnsubRef.current();
                    selfProfileUnsubRef.current = null;
                }
                
                window.__fbSkipAuthCallback = false;
                await fbAuth.signOut();
                window.__fbUser = null;
                setUser(null);
                setShowLanding(true);
                setActiveView('dashboard');
            };

            const handleUpdate = () => setUpdateTrigger(p => p + 1);

            if (showLanding && !user) return <LandingPage onGetStarted={() => setShowLanding(false)} />;
            if (!user)                return <Auth onLogin={handleLogin} />;

            
            console.log("[App] Rendering dashboard — role:", user.role, "uid:", user.uid, "verified:", user.verified);

            const roleLabel = { donor: 'Donor', ngo: 'NGO', admin: 'Administrator' };
            const roleIcon  = { donor: '🤲',   ngo: '🏥',  admin: '⚙️' };
            const tabLabel  = { donor: 'My Donations', ngo: 'Browse Resources', admin: 'Admin Panel' };

            return (
                <div className="app-container">
                    <header className="header">
                        <div className="logo">
                            <div className="logo-leaf">🌿</div>
                            <div>
                                ResourceBridge
                                <span className="logo-tagline">Surplus to Need</span>
                            </div>
                        </div>
                        <div className="header-right">
                            <div className="user-pill">
                                <div className="user-avatar">{roleIcon[user.role] || '👤'}</div>
                                <div>
                                    <div className="user-name">{user.name}</div>
                                    <div className="user-role">{roleLabel[user.role] || user.role}</div>
                                </div>
                            </div>
                            <button className="btn btn-ghost btn-small" onClick={handleLogout}>Sign out</button>
                        </div>
                    </header>

                    <div className="content">
                        <div className="tab-container">
                            <button className={`tab ${activeView === 'dashboard' ? 'active' : ''}`} onClick={() => setActiveView('dashboard')}>
                                {tabLabel[user.role] || 'Dashboard'}
                            </button>
                            <button className={`tab ${activeView === 'impact' ? 'active' : ''}`} onClick={() => setActiveView('impact')}>
                                Impact Dashboard
                            </button>
                        </div>

                        {activeView === 'dashboard' && (
                            <>
                                {user.role === 'donor' && (
                                    <DonorDashboard user={user} onUpdate={handleUpdate} />
                                )}
                                {user.role === 'ngo' && (
                                    <NGODashboard user={user} onUpdate={handleUpdate} />
                                )}
                                {user.role === 'admin' && (
                                    <AdminDashboard user={user} onUpdate={handleUpdate} />
                                )}
                                {!['donor','ngo','admin'].includes(user.role) && (
                                    <div style={{ padding: '40px', textAlign: 'center', color: 'var(--text-soft)' }}>
                                        <div style={{ fontSize: '40px', marginBottom: '12px' }}>⚠️</div>
                                        <div style={{ fontFamily: 'var(--font-display)', fontSize: '22px' }}>
                                            Unrecognised role: "{user.role}"
                                        </div>
                                        <div style={{ marginTop: '8px', fontSize: '14px' }}>
                                            Please contact support or sign out and try again.
                                        </div>
                                    </div>
                                )}
                            </>
                        )}
                        {activeView === 'impact' && <ImpactDashboard />}
                    </div>
                </div>
            );
        }

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
